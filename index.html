<!DOCTYPE html>
<html>
<head>
    <title>Srinivas Foods</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Srinivas Foods</h1>
    <p class="tagline">Fresh • Hygienic • Affordable Veg Delights</p>

    <!-- Offers -->
    <div class="card">
        <h2>🔥 Special Offers</h2>
        <p>20% OFF on First Order</p>
        <p>Buy 2 Get 1 Free on Veg Fried Rice</p>
        <p>Free Delivery above ₹499</p>
    </div>

    <!-- Menu -->
    <div class="card">
        <h2>🍽 Menu</h2>

        <div class="item">
            <p>Paneer Butter Masala - ₹320</p>
            <input type="number" id="p1" value="1" min="1">
            <button onclick="addToCart('Paneer Butter Masala',320,'p1')">Add</button>
        </div>

        <div class="item">
            <p>Veg Fried Rice - ₹160</p>
            <input type="number" id="p2" value="1" min="1">
            <button onclick="addToCart('Veg Fried Rice',160,'p2')">Add</button>
        </div>

        <div class="item">
            <p>Mushroom Masala - ₹220</p>
            <input type="number" id="p3" value="1" min="1">
            <button onclick="addToCart('Mushroom Masala',220,'p3')">Add</button>
        </div>

    </div>

    <!-- Cart -->
    <div class="card">
        <h2>🛒 Cart</h2>
        <div id="cartItems"></div>
        <h3>Total: ₹<span id="total">0</span></h3>
    </div>

    <!-- Reviews -->
    <div class="card">
        <h2>⭐ Reviews</h2>
        <div id="reviews"></div>

        <input type="text" id="name" placeholder="Your Name">
        <textarea id="reviewText" placeholder="Write review"></textarea>
        <button onclick="addReview()">Submit</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
